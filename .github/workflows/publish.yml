name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Smoke (mocked HTTP)
        run: pnpm run smoke

      - name: Debug npm publish context
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set +e
          NPM_REGISTRY="$(npm config get registry 2>&1)"
          NPM_SCOPE_REGISTRY="$(npm config get @lewinnovation:registry 2>&1)"
          NPM_WHOAMI_OUTPUT="$(npm whoami 2>&1)"
          NPM_WHOAMI_EXIT="$?"
          NPM_PING_OUTPUT="$(npm ping --registry=https://registry.npmjs.org 2>&1)"
          NPM_PING_EXIT="$?"
          NPM_SCOPE_ACCESS_OUTPUT="$(npm access ls-packages @lewinnovation --json 2>&1)"
          NPM_SCOPE_ACCESS_EXIT="$?"
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          NPMRC_CONTENT="$(sed -n '1,120p' "$NPMRC_PATH" 2>&1)"
          echo "DEBUG_NPM_REGISTRY=$NPM_REGISTRY"
          echo "DEBUG_NPM_SCOPE_REGISTRY=$NPM_SCOPE_REGISTRY"
          echo "DEBUG_NPM_WHOAMI_EXIT=$NPM_WHOAMI_EXIT"
          echo "DEBUG_NPM_WHOAMI_OUTPUT=$NPM_WHOAMI_OUTPUT"
          echo "DEBUG_NPM_PING_EXIT=$NPM_PING_EXIT"
          echo "DEBUG_NPM_PING_OUTPUT=$NPM_PING_OUTPUT"
          echo "DEBUG_NPM_SCOPE_ACCESS_EXIT=$NPM_SCOPE_ACCESS_EXIT"
          echo "DEBUG_NPM_SCOPE_ACCESS_OUTPUT=$NPM_SCOPE_ACCESS_OUTPUT"
          echo "DEBUG_NPMRC_PATH=$NPMRC_PATH"
          echo "DEBUG_NPMRC_CONTENT=$NPMRC_CONTENT"
          NPM_REGISTRY="$NPM_REGISTRY" NPM_SCOPE_REGISTRY="$NPM_SCOPE_REGISTRY" NPM_WHOAMI_OUTPUT="$NPM_WHOAMI_OUTPUT" NPM_WHOAMI_EXIT="$NPM_WHOAMI_EXIT" NPM_PING_OUTPUT="$NPM_PING_OUTPUT" NPM_PING_EXIT="$NPM_PING_EXIT" NPM_SCOPE_ACCESS_OUTPUT="$NPM_SCOPE_ACCESS_OUTPUT" NPM_SCOPE_ACCESS_EXIT="$NPM_SCOPE_ACCESS_EXIT" NPMRC_PATH="$NPMRC_PATH" node <<'EOF'
          // #region agent log H1
          fetch('http://127.0.0.1:7369/ingest/48d09b78-a274-4935-8ac0-4da822a54ad7',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'0ca334'},body:JSON.stringify({sessionId:'0ca334',runId:String(process.env.GITHUB_RUN_ID||'unknown'),hypothesisId:'H1',location:'.github/workflows/publish.yml:debug-context',message:'Resolved npm registry settings for default and scope',data:{defaultRegistry:process.env.NPM_REGISTRY,scopeRegistry:process.env.NPM_SCOPE_REGISTRY||null},timestamp:Date.now()})}).catch(()=>{});
          // #endregion
          // #region agent log H2
          fetch('http://127.0.0.1:7369/ingest/48d09b78-a274-4935-8ac0-4da822a54ad7',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'0ca334'},body:JSON.stringify({sessionId:'0ca334',runId:String(process.env.GITHUB_RUN_ID||'unknown'),hypothesisId:'H2',location:'.github/workflows/publish.yml:debug-context',message:'npm whoami result to detect auth mode/identity',data:{whoamiExitCode:Number(process.env.NPM_WHOAMI_EXIT||'-1'),whoamiOutput:String(process.env.NPM_WHOAMI_OUTPUT||'').slice(0,500)},timestamp:Date.now()})}).catch(()=>{});
          // #endregion
          // #region agent log H3
          fetch('http://127.0.0.1:7369/ingest/48d09b78-a274-4935-8ac0-4da822a54ad7',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'0ca334'},body:JSON.stringify({sessionId:'0ca334',runId:String(process.env.GITHUB_RUN_ID||'unknown'),hypothesisId:'H3',location:'.github/workflows/publish.yml:debug-context',message:'npm ping result to validate connectivity to npm registry',data:{pingExitCode:Number(process.env.NPM_PING_EXIT||'-1'),pingOutput:String(process.env.NPM_PING_OUTPUT||'').slice(0,500)},timestamp:Date.now()})}).catch(()=>{});
          // #endregion
          // #region agent log H5
          fetch('http://127.0.0.1:7369/ingest/48d09b78-a274-4935-8ac0-4da822a54ad7',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'0ca334'},body:JSON.stringify({sessionId:'0ca334',runId:String(process.env.GITHUB_RUN_ID||'unknown'),hypothesisId:'H5',location:'.github/workflows/publish.yml:debug-context',message:'scope access and npmrc context',data:{scopeAccessExitCode:Number(process.env.NPM_SCOPE_ACCESS_EXIT||'-1'),scopeAccessOutput:String(process.env.NPM_SCOPE_ACCESS_OUTPUT||'').slice(0,500),npmrcPath:process.env.NPMRC_PATH||''},timestamp:Date.now()})}).catch(()=>{});
          // #endregion
          EOF

      - name: Publish to npm
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set +e
          PUBLISH_OUTPUT="$(npm publish --access public --provenance 2>&1)"
          PUBLISH_EXIT="$?"
          echo "$PUBLISH_OUTPUT"
          PUBLISH_OUTPUT="$PUBLISH_OUTPUT" PUBLISH_EXIT="$PUBLISH_EXIT" node <<'EOF'
          // #region agent log H4
          fetch('http://127.0.0.1:7369/ingest/48d09b78-a274-4935-8ac0-4da822a54ad7',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'0ca334'},body:JSON.stringify({sessionId:'0ca334',runId:String(process.env.GITHUB_RUN_ID||'unknown'),hypothesisId:'H4',location:'.github/workflows/publish.yml:publish',message:'npm publish completed with exit code and output excerpt',data:{publishExitCode:Number(process.env.PUBLISH_EXIT||'-1'),publishOutput:String(process.env.PUBLISH_OUTPUT||'').slice(0,800)},timestamp:Date.now()})}).catch(()=>{});
          // #endregion
          EOF
          if [ "$PUBLISH_EXIT" -ne 0 ]; then
            exit "$PUBLISH_EXIT"
          fi
